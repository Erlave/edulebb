{% extends "base.html" %}
{% load static %}
{% load poll_extras %}



{% block content %}


    

    <section class="section-top">
        <div class="container">
            <div class="col-lg-10 offset-lg-1 text-center">
                <div class="section-top-title wow fadeInRight" data-wow-duration="1s" data-wow-delay="0.3s"
                    data-wow-offset="0">
                    <h1>وبلاگ ما</h1>
                    <ul>
                        <li><a href="{% url "home" %}">صفحه اصلی</a></li>
                        <li>/ وبلاگ</li>
                    </ul>
                </div>
            </div>
        </div>
    </section>

    <section id="blog" class="blog_area section-padding">
        <div class="container">
            <div class="row">

                {% for  blog in blogs  %}
                <div class="col-lg-4 col-sm-4 col-xs-12 wow fadeInUp" data-wow-duration="1s" data-wow-delay="0.1s"
                    data-wow-offset="0">
                    <div class="single_blog">
                        <img src="{{ blog.image.url }}" class="img-fluid" alt="{{ blog.title }}">
                        <div class="content_box">
                            <span>{{ blog.created_at|date:"Y/m/d" }}|<a href="blog_single.html">{{ blog.category.title }}</a></span>
                            <h2><a href="blog_single.html">{{ blog.title }}</a></h2>
                            <a class="btn_one" href="{{ blog.get_absolute_url }}">ادامه مطلب<i class="ti-arrow-top-left"></i></a>
                        </div>
                    </div>
                </div>
                {% endfor %}

            </div>
        </div>
    </section>






{% endblock content %}
